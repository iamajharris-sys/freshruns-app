[build]
  publish = "public"
  functions = "netlify/functions"

# Friendly redirect so /approve works without the .html
[[redirects]]
  from = "/approve"
  to = "/approve.html"
  status = 200

[[redirects]]
  from = "/shopper"
  to = "/shopper.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200
